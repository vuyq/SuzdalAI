<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI-гид по Суздалю</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    input { width: 300px; padding: 8px; }
    button { padding: 8px; }
    pre { background: #eee; padding: 10px; }
  </style>
</head>
<body>
<h2>Едете в Суздаль?</h2>
<input id="query" placeholder="Например: куда пойти с детьми" />
<button onclick="search()">Найти</button>
<pre id="results"></pre>
<script>
async function search(){
  let q = document.getElementById('query').value;
  let r = await fetch('/api/search', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({query: q})
  });
  let data = await r.json();
  document.getElementById('results').textContent = JSON.stringify(data.results, null, 2);
}
</script>
</body>
</html>
